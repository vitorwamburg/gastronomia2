<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Quiz - Culinária Internacional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* 1. CONFIGURAÇÃO BASE (ESTILO CONSULTORIA) */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-primary: #38bdf8;
            --accent-success: #22c55e;
            --accent-error: #ef4444;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #020617;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Content Container - Fluído por padrão, fixo em ecrãs grandes */
        .presentation-container {
            width: 100%;
            max-width: 1280px;
            height: 720px;
            background-color: var(--bg-color);
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
        }

        /* HEADER DO SLIDE */
        .slide-header {
            padding: 40px 60px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .slide-title {
            font-family: 'Poppins', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .slide-counter {
            font-size: 16px;
            color: var(--text-dim);
            font-weight: 300;
            white-space: nowrap;
        }

        /* ÁREA DE CONTEÚDO */
        .content-area {
            flex-grow: 1;
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .quiz-layout {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* LAYOUT DE QUESTÃO */
        .question-box {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .question-text {
            font-size: 28px;
            line-height: 1.4;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .option-btn {
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px 25px;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 18px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .option-btn:hover:not(:disabled) {
            background: #334155;
            border-color: var(--accent-primary);
            transform: translateX(5px);
        }

        .option-btn span {
            margin-right: 15px;
            color: var(--accent-primary);
            font-weight: 700;
        }

        .option-btn.correct { background: var(--accent-success) !important; border-color: transparent; }
        .option-btn.wrong { background: var(--accent-error) !important; border-color: transparent; }

        /* MODAL DE FEEDBACK */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 6, 23, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 100;
        }

        .modal-content {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 50px;
            border-radius: 12px;
            border-left: 8px solid var(--accent-primary);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-status {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .modal-explanation {
            font-size: 18px;
            line-height: 1.6;
            color: var(--text-main);
            margin-bottom: 30px;
        }

        .btn-next {
            background: var(--accent-primary);
            color: #000;
            padding: 15px 40px;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            float: right;
            transition: all 0.2s ease;
        }

        .btn-next:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }

        /* SLIDE DE INTRO (BLEED IMAGE) */
        .intro-slide {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100%;
        }

        .intro-text {
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .intro-image {
            background-size: cover;
            background-position: center;
        }

        /* FINAL RESULTS */
        .score-circle {
            width: 200px;
            height: 200px;
            border: 10px solid var(--accent-primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            font-weight: 700;
            margin: 40px auto;
        }

        /* UTILITÁRIOS */
        .hidden { display: none !important; }

        /* ==========================================================================
           RESPONSIVIDADE (OTIMIZAÇÃO PARA SMARTPHONES E TABLETS)
           ========================================================================== */
        @media (max-width: 1280px) {
            body {
                align-items: flex-start;
                padding: 0;
            }
            .presentation-container {
                height: auto;
                min-height: 100vh;
                border-radius: 0;
            }
        }

        @media (max-width: 768px) {
            .slide-header {
                padding: 25px 20px 15px;
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .slide-title {
                font-size: 22px;
            }
            .slide-counter {
                font-size: 14px;
            }
            .content-area {
                padding: 25px 20px;
            }
            .question-text {
                font-size: 20px;
                margin-bottom: 25px;
            }
            .options-grid {
                grid-template-columns: 1fr; /* Força uma coluna no telemóvel */
                gap: 12px;
            }
            .option-btn {
                padding: 16px 20px;
                font-size: 16px;
            }
            .intro-slide {
                grid-template-columns: 1fr;
            }
            .intro-text {
                padding: 40px 20px;
                text-align: center;
                align-items: center;
            }
            .intro-text h1 {
                font-size: 38px !important;
            }
            .intro-text p {
                font-size: 16px !important;
                margin-bottom: 25px !important;
            }
            .intro-image {
                height: 200px;
                order: -1; /* Imagem fica no topo no telemóvel */
            }
            .modal-content {
                padding: 30px 20px;
                border-left: none;
                border-top: 8px solid var(--accent-primary);
            }
            .modal-status {
                font-size: 20px;
            }
            .modal-explanation {
                font-size: 15px;
            }
            .btn-next {
                width: 100%;
                text-align: center;
                float: none;
                padding: 15px 20px;
            }
            .score-circle {
                width: 150px;
                height: 150px;
                font-size: 36px;
                margin: 30px auto;
            }
            #result-slide h1 {
                font-size: 32px !important;
            }
            #performance-msg {
                font-size: 18px !important;
            }
        }
    </style>
</head>
<body>

<div class="presentation-container">
    <div id="welcome-slide" class="intro-slide">
        <div class="intro-text">
            <h1 style="font-family: 'Poppins'; font-size: 64px; line-height: 1.1; margin-bottom: 20px;">MASTER QUIZ<br><span style="color: var(--accent-primary)">GASTRONOMIA</span></h1>
            <p style="color: var(--text-dim); font-size: 20px; margin-bottom: 40px;">Uma avaliação técnica sobre pratos icónicos da culinária mundial.</p>
            <button class="btn-next" onclick="startQuiz()" style="float:none; width: fit-content;">Iniciar Avaliação</button>
        </div>
        <div class="intro-image" style="background-image: url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?q=80&w=2070&auto=format&fit=crop')"></div>
    </div>

    <div id="quiz-interface" class="hidden quiz-layout">
        <div class="slide-header">
            <div class="slide-title" id="topic-name">Tema: Gastronomia</div>
            <div class="slide-counter" id="progress-text">Questão 01/30</div>
        </div>

        <div class="content-area">
            <div class="question-box">
                <h2 class="question-text" id="question-label">A carregar pergunta...</h2>
                <div class="options-grid" id="options-grid"></div>
            </div>
        </div>
    </div>

    <div id="result-slide" class="hidden content-area" style="text-align: center; align-items: center;">
        <h1 style="font-family: 'Poppins'; font-size: 48px;">Avaliação Concluída</h1>
        <div class="score-circle" id="final-score">0/0</div>
        <p id="performance-msg" style="font-size: 24px; color: var(--text-dim); max-width: 700px; margin: 0 auto; line-height: 1.4;"></p>
        <button class="btn-next" onclick="location.reload()" style="float:none; margin-top: 50px;">Reiniciar Quiz</button>
    </div>

    <div id="feedback-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-status" id="modal-title">Resultado</div>
            <div class="modal-explanation" id="modal-desc">Explicação aqui...</div>
            <button class="btn-next" id="btn-next-action" onclick="goToNext()">Próxima Questão</button>
        </div>
    </div>
</div>

<script>
    const questions = [
        // LOCRO
        { topic: "Locro Andino", q: "O Locro é um prato tradicional de qual região?", options: ["Europa Oriental", "América do Norte", "Andes (Argentina/Peru)", "Sudeste Asiático", "Oriente Médio"], correct: 2, exp: "O locro é típico da região andina, especialmente Argentina. É um prato histórico de base indígena consumido em datas nacionais." },
        { topic: "Locro Andino", q: "Qual ingrediente é fundamental para a identidade do Locro?", options: ["Arroz", "Milho branco", "Macarrão", "Lentilha", "Batata doce"], correct: 1, exp: "O milho branco é a base estrutural, responsável pela libertação de amido que engrossa o caldo naturalmente." },
        { topic: "Locro Andino", q: "Qual é a sequência correta de preparação do Locro?", options: ["Refogar → tudo cru → servir", "Cozer base → refogar → carnes → abóbora → cozedura lenta", "Carnes primeiro → servir → cozer depois", "Misturar tudo frio", "Cozer abóbora antes do milho"], correct: 1, exp: "A técnica exige hidratar a base, desenvolver o refogado, integrar as proteínas e permitir uma cocção longa." },
        { topic: "Locro Andino", q: "Qual erro sutil compromete a textura do Locro?", options: ["Cozinhar lentamente", "Usar milho branco", "Adicionar abóbora antes do milho estar macio", "Refogar temperos", "Usar carnes variadas"], correct: 2, exp: "A abóbora coze rápido. Se entrar cedo demais, desmancha-se e desequilibra a textura final." },
        { topic: "Locro Andino", q: "Se o Locro não atingir a consistência espessa, qual erro ocorreu?", options: ["Falta de sal", "Tipo de carne", "Base mal cozida ou tempo de redução insuficiente", "Corte da cebola", "Uso de alho"], correct: 2, exp: "A densidade depende da libertação de amido e da redução lenta em lume brando." },
        
        // FISH & CHIPS
        { topic: "Fish & Chips", q: "O Fish and Chips é um prato tradicional de qual país?", options: ["França", "Estados Unidos", "Inglaterra", "Espanha", "Portugal"], correct: 2, exp: "Um clássico absoluto da cultura britânica, servido tradicionalmente em papel de jornal." },
        { topic: "Fish & Chips", q: "O que caracteriza a massa (polme) do peixe no Fish & Chips?", options: ["Leite", "Ovo batido", "Cerveja", "Natas", "Água"], correct: 2, exp: "A cerveja cria leveza, aeração e uma crocância superior devido ao gás e ao álcool." },
        { topic: "Fish & Chips", q: "Qual é a sequência correta de preparação?", options: ["Fritar peixe cru sem massa", "Fazer massa → envolver peixe → fritar peixe e batata", "Assar peixe", "Cozer peixe", "Fritar só batata"], correct: 1, exp: "O peixe deve ser passado por farinha e depois pelo polme antes da fritura por imersão." },
        { topic: "Fish & Chips", q: "Qual erro parece pequeno, mas destrói o resultado crocante?", options: ["Usar cerveja", "Fritar em óleo pouco quente", "Empanar corretamente", "Usar peixe branco", "Cortar batatas"], correct: 1, exp: "Óleo frio faz a massa absorver gordura como uma esponja, perdendo a crocância." },
        { topic: "Fish & Chips", q: "O que acontece se a massa ficar pesada e oleosa?", options: ["Excesso de sal", "Falha na temperatura do óleo ou na aeração da massa", "Tipo de peixe", "Corte da batata", "Uso de farinha"], correct: 1, exp: "O sucesso depende do choque térmico e da leveza da massa para evitar a retenção de óleo." },

        // SCHNITZEL
        { topic: "Schnitzel", q: "O Schnitzel é um prato tradicional de qual região?", options: ["Itália", "França", "Alemanha/Áustria", "Espanha", "Grécia"], correct: 2, exp: "O Wiener Schnitzel é o ex-líbris da Áustria, sendo uma técnica refinada de panar carne." },
        { topic: "Schnitzel", q: "Qual é a sequência correta do panado (empanamento)?", options: ["Ovo → farinha → pão ralado", "Farinha → ovo → pão ralado", "Farinha → água → pão ralado", "Ovo → pão ralado → farinha", "Só farinha"], correct: 1, exp: "Farinha (secar), Ovo (aderência), Pão ralado (crocância). A ordem é inviolável." },
        { topic: "Schnitzel", q: "Qual é a sequência correta de etapas?", options: ["Fritar → panar → servir", "Bater carne → panar → fritar", "Cozer → panar", "Assar direto", "Só fritar sem preparo"], correct: 1, exp: "Bater a carne garante uniformidade, permitindo que cozinhe por igual e de forma rápida." },
        { topic: "Schnitzel", q: "Qual erro sutil compromete a correta cozedura?", options: ["Panar corretamente", "Bater a carne", "Não uniformizar a espessura da carne", "Usar pão ralado", "Fritar"], correct: 2, exp: "Espessura irregular faz com que partes passem do ponto e outras fiquem cruas." },
        { topic: "Schnitzel", q: "Porque deve o Schnitzel ser frito em manteiga clarificada?", options: ["Apenas sabor", "Suportar alta temperatura sem queimar", "Deixar mais salgado", "Dar cor artificial", "Substituir óleo"], correct: 1, exp: "A manteiga comum queima rápido. A clarificada suporta o calor necessário para a fritura perfeita." },

        // SOUPE À L'OIGNON
        { topic: "Soupe à l’Oignon", q: "A Soupe à l’Oignon é um prato tradicional de qual país?", options: ["Itália", "Espanha", "França", "Bélgica", "Suíça"], correct: 2, exp: "Clássico parisiense, originalmente servido nos mercados para repor energias durante a madrugada." },
        { topic: "Soupe à l’Oignon", q: "Qual combinação representa corretamente o prato?", options: ["Cebola, caldo de carne, vinho branco, pão e queijo", "Batata, leite e manteiga", "Tomate, alho e manjericão", "Carne, arroz e legumes", "Peixe, limão e natas"], correct: 0, exp: "A cebola caramelizada e o caldo rico são a base. O pão e o queijo dão a finalização gratinada icónica." },
        { topic: "Soupe à l’Oignon", q: "Qual é a sequência correta de preparação?", options: ["Adicionar caldo → cebola crua → gratinar", "Caramelizar cebolas → caldo → montar com pão/queijo → gratinar", "Ferver tudo junto", "Assar cebola direto", "Só aquecer caldo"], correct: 1, exp: "O sabor vem da caramelização lenta das cebolas antes da adição de qualquer líquido." },
        { topic: "Soupe à l’Oignon", q: "Qual erro parece pequeno, mas destrói a sopa?", options: ["Usar caldo de carne", "Gratinar com queijo", "Caramelizar a cebola rápido em lume forte", "Usar pão", "Adicionar vinho"], correct: 2, exp: "Caramelizar não é queimar. Lume forte amarga a cebola e perde a doçura natural da reação." },
        { topic: "Soupe à l’Oignon", q: "O que acontece se a cebola não for bem caramelizada?", options: ["Só muda a cor", "O prato perde profundidade de sabor e fica 'plano'", "Fica mais salgado", "O queijo não derrete", "O pão dissolve"], correct: 1, exp: "Sem a caramelização correta, não há desenvolvimento de complexidade e o caldo fica sem identidade." },

        // POMMES DUCHESSE
        { topic: "Pommes Duchesse", q: "O Pommes Duchesse é um preparo clássico de qual país?", options: ["Itália", "Alemanha", "França", "Espanha", "Inglaterra"], correct: 2, exp: "Prato clássico da culinária francesa. É uma preparação refinada de batata, muito usada como guarnição em alta gastronomia." },
        { topic: "Pommes Duchesse", q: "Qual combinação representa corretamente o Pommes Duchesse?", options: ["Batata, leite e farinha", "Batata, manteiga e gemas", "Batata, natas e queijo", "Batata, óleo e água", "Batata, ovo inteiro e açúcar"], correct: 1, exp: "A base correta exige um puré de batata seco, manteiga (que dá estrutura e sabor) e gemas (para ligação e cor). Não leva líquido excessivo." },
        { topic: "Pommes Duchesse", q: "Qual é a sequência correta de preparação?", options: ["Fazer puré líquido → assar direto", "Fazer puré seco → misturar gemas e manteiga → modelar → assar", "Fritar batata → misturar tudo", "Cozer → servir direto", "Assar batata crua"], correct: 1, exp: "O fluxo técnico exige fazer um puré seco, incorporar a gordura e a gema, modelar (geralmente com saco de pasteleiro) e levar ao forno para dourar." },
        { topic: "Pommes Duchesse", q: "Qual erro subtil compromete totalmente o resultado?", options: ["Usar manteiga", "Assar no forno", "Fazer o puré muito húmido", "Usar gemas", "Modelar com saco de pasteleiro"], correct: 2, exp: "Rasteira forte: um puré húmido não mantém o formato, espalha-se no forno e não cria a estrutura estriada característica. A técnica exige um puré bem seco." },
        { topic: "Pommes Duchesse", q: "O que acontece se adicionar as gemas com o puré ainda muito quente?", options: ["Nada acontece", "As gemas cozinham parcialmente e comprometem a textura", "Fica mais crocante", "Melhora a cor", "Só altera o sabor"], correct: 1, exp: "Erro clássico de prova prática: a temperatura alta coagula as gemas antes do tempo, criando uma textura irregular e com grumos. Deve-se deixar arrefecer ligeiramente antes de incorporar." },

        // YAKISSOBA
        { topic: "Yakissoba", q: "O Yakissoba é um prato tradicional de qual país?", options: ["China", "Coreia do Sul", "Japão", "Tailândia", "Vietname"], correct: 2, exp: "Apesar das influências históricas chinesas, o yakissoba foi adaptado, estruturado e popularizado na cultura do Japão, tornando-se um clássico de street food e festividades." },
        { topic: "Yakissoba", q: "Qual combinação representa corretamente o Yakissoba?", options: ["Arroz, peixe e limão", "Massa, carne, legumes e molho à base de shoyu", "Batata, frango e leite", "Lentilhas, arroz e cebola", "Talharim doce com frutas"], correct: 1, exp: "A identidade estrutural do prato assenta na combinação de massa frita/salteada, proteínas (carne/frango), vegetais crocantes e um molho denso balanceado com molho de soja." },
        { topic: "Yakissoba", q: "Qual é a sequência correta de preparação no Wok?", options: ["Cozinhar tudo junto desde o início", "Adicionar o molho antes de selar os ingredientes", "Saltear proteínas → adicionar legumes → incorporar massa → finalizar com molho", "Ferver todos os ingredientes em simultâneo", "Assar os ingredientes no forno"], correct: 2, exp: "A técnica correta exige trabalhar por etapas sequenciais: selar as proteínas para reter os sucos, introduzir os vegetais mantendo o crocante, agregar a massa e envolver tudo com o molho no final." },
        { topic: "Yakissoba", q: "Qual erro subtil compromete gravemente a textura do Yakissoba?", options: ["Usar molho shoyu de qualidade", "Saltear os alimentos em lume forte", "Colocar todos os ingredientes de uma vez no wok", "Utilizar legumes frescos", "Misturar bem os componentes no fim"], correct: 2, exp: "Rasteira clássica de cozinha rápida: colocar demasiados ingredientes em simultâneo sobrecarrega o wok, derruba a temperatura e faz com que os alimentos cozam no próprio vapor em vez de saltearem." },
        { topic: "Yakissoba", q: "O que acontece se o wok não estiver suficientemente quente durante a confeção?", options: ["Apenas altera a cor final dos alimentos", "Os ingredientes libertam água em excesso e o prato perde textura e sabor de salteado", "A massa desenvolve uma textura mais crocante", "Os legumes cozinham muito mais rápido", "Não ocorre qualquer alteração no resultado final"], correct: 1, exp: "A cozinha de wok depende de calor alto imediato para gerar a reação de Maillard. Se faltar energia térmica, os vegetais e carnes começam a minar água, o prato fica com aspeto cozido, ensopado e perde o sabor defumado característico." }
    ];

    let currentIdx = 0;
    let score = 0;

    function startQuiz() {
        document.getElementById('welcome-slide').classList.add('hidden');
        document.getElementById('quiz-interface').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const q = questions[currentIdx];
        document.getElementById('topic-name').innerText = `Tema: ${q.topic}`;
        document.getElementById('progress-text').innerText = `Questão ${String(currentIdx + 1).padStart(2, '0')}/${questions.length}`;
        document.getElementById('question-label').innerText = q.q;
        
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<span>${String.fromCharCode(65 + i)})</span> ${opt}`;
            btn.onclick = () => checkAnswer(i, btn);
            grid.appendChild(btn);
        });
    }

    function checkAnswer(choice, btn) {
        const q = questions[currentIdx];
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);

        if(choice === q.correct) {
            btn.classList.add('correct');
            score++;
            document.getElementById('modal-title').innerText = "✅ Correto";
            document.getElementById('modal-title').style.color = "var(--accent-success)";
        } else {
            btn.classList.add('wrong');
            allBtns[q.correct].classList.add('correct');
            document.getElementById('modal-title').innerText = "❌ Incorreto";
            document.getElementById('modal-title').style.color = "var(--accent-error)";
        }

        document.getElementById('modal-desc').innerHTML = `💡 <strong>Explicação:</strong> ${q.exp}`;
        document.getElementById('feedback-modal').style.display = 'flex';
        
        if(currentIdx === questions.length - 1) {
            document.getElementById('btn-next-action').innerText = "Ver Resultados";
        }
    }

    function goToNext() {
        document.getElementById('feedback-modal').style.display = 'none';
        currentIdx++;
        if(currentIdx < questions.length) {
            loadQuestion();
        } else {
            showFinal();
        }
    }

    function showFinal() {
        document.getElementById('quiz-interface').classList.add('hidden');
        document.getElementById('result-slide').classList.remove('hidden');
        
        document.getElementById('final-score').innerText = `${score}/${questions.length}`;
        
        let msg = "";
        const perc = score / questions.length;
        if(perc === 1) msg = "Excecional! Dominas todas as frentes da cozinha técnica internacional. Nível de Chef Executivo!";
        else if(perc >= 0.8) msg = "Excelente! Demonstras grande precisão técnica, gestão térmica de wok, humidade de purés e processos críticos.";
        else if(perc >= 0.5) msg = "Bom desempenho. Tens as bases, mas cuidado com as rasteiras de temperatura, tempo e sobrecarga de utensílios.";
        else msg = "É necessário reforçar os conceitos de caramelização, pontos de fumo e controlo de vapor. Vamos voltar aos tachos?";
        
        document.getElementById('performance-msg').innerText = msg;
    }
</script>

</body>
</html>
